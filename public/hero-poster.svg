<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1a0408"/>
      <stop offset="45%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#04060c"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#04060c"/>
    </linearGradient>
    <radialGradient id="redglow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#D6001C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D6001C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#redglow)"/>
  <!-- silhouette canal houses -->
  <g fill="#070910" opacity="0.95">
    <rect x="180" y="520" width="120" height="300"/><polygon points="180,520 240,470 300,520"/>
    <rect x="320" y="480" width="110" height="340"/><rect x="320" y="460" width="110" height="22"/><rect x="332" y="438" width="86" height="22"/>
    <rect x="450" y="540" width="130" height="280"/><polygon points="450,540 515,495 580,540"/>
    <rect x="600" y="500" width="120" height="320"/><rect x="600" y="478" width="120" height="22"/>
    <rect x="1340" y="510" width="120" height="310"/><polygon points="1340,510 1400,465 1460,510"/>
    <rect x="1480" y="490" width="110" height="330"/><rect x="1480" y="468" width="110" height="22"/><rect x="1492" y="446" width="86" height="22"/>
    <rect x="1610" y="535" width="130" height="285"/><polygon points="1610,535 1675,490 1740,535"/>
  </g>
  <!-- warm window dots -->
  <g fill="#ffc266">
    <rect x="210" y="560" width="14" height="20" opacity="0.8"/><rect x="250" y="600" width="14" height="20" opacity="0.6"/>
    <rect x="350" y="520" width="14" height="20" opacity="0.7"/><rect x="390" y="560" width="14" height="20" opacity="0.9"/>
    <rect x="630" y="540" width="14" height="20" opacity="0.7"/><rect x="660" y="600" width="14" height="20" opacity="0.5"/>
    <rect x="1370" y="550" width="14" height="20" opacity="0.8"/><rect x="1510" y="520" width="14" height="20" opacity="0.7"/>
    <rect x="1650" y="575" width="14" height="20" opacity="0.6"/>
  </g>
  <!-- water -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#water)"/>
  <!-- reflection streaks -->
  <g fill="#ffc266" opacity="0.10">
    <rect x="210" y="820" width="10" height="120"/><rect x="390" y="820" width="10" height="140"/>
    <rect x="1370" y="820" width="10" height="130"/><rect x="1650" y="820" width="10" height="120"/>
  </g>
  <rect x="950" y="820" width="6" height="180" fill="#D6001C" opacity="0.12"/>
</svg>
